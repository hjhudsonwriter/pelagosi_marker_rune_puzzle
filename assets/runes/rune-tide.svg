<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#15395b"/>
      <stop offset="100%" stop-color="#081524"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="210" fill="url(#bg)" stroke="#89e5ff" stroke-width="10"/>
  <circle cx="256" cy="256" r="172" fill="none" stroke="#89e5ff" stroke-opacity="0.35" stroke-width="4"/>
  <text x="50%" y="48%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="170" fill="#dff8ff" filter="url(#glow)">☾</text>
  <text x="50%" y="78%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="34" fill="#9edff4" letter-spacing="5">TIDE</text>
</svg>